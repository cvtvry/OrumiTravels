<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ginzan Onsen | Orumi Journeys</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================================================= */
/* ====================== RESET ==================== */
/* ================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{

  font-family:'Nunito', sans-serif;

  overflow-x:hidden;

  color:white;

  background:#1f2527;

  position:relative;
}

/* ================================================= */
/* ================= MAIN BACKGROUND =============== */
/* ================================================= */

body::before{

  content:"";

  position:fixed;

  inset:0;

  z-index:-10;

  background:

    radial-gradient(
      circle at 50% -10%,
      rgba(255,255,255,0.20),
      transparent 38%
    ),

    radial-gradient(
      circle at 0% 50%,
      rgba(20,28,30,0.34),
      transparent 44%
    ),

    radial-gradient(
      circle at 100% 50%,
      rgba(16,22,24,0.30),
      transparent 42%
    ),

    radial-gradient(
      circle at 24% 72%,
      rgba(90,110,115,0.20),
      transparent 32%
    ),

    radial-gradient(
      circle at 82% 38%,
      rgba(180,140,90,0.10),
      transparent 24%
    ),

    radial-gradient(
      circle at 50% 50%,
      rgba(255,255,255,0.05),
      transparent 56%
    ),

    linear-gradient(
      180deg,

      #8D9AA3 0%,

      #73818A 20%,

      #5E6C74 42%,

      #4C575D 62%,

      #384147 82%,

      #262C30 100%
    );

  background-attachment:fixed;
}

body::after{

  content:"";

  position:fixed;

  inset:0;

  z-index:-9;

  opacity:.12;

  background-image:
    url("https://www.transparenttextures.com/patterns/rice-paper-3.png");

  mix-blend-mode:soft-light;

  pointer-events:none;
}

/* ================================================= */
/* ==================== VIGNETTE =================== */
/* ================================================= */

.vignette{

  position:fixed;

  inset:0;

  z-index:-1;

  pointer-events:none;

  background:
    radial-gradient(
      circle at center,
      transparent 34%,
      rgba(0,0,0,0.12) 55%,
      rgba(0,0,0,0.32) 78%,
      rgba(0,0,0,0.58) 100%
    );

  mix-blend-mode:multiply;
}

/* ================================================= */
/* ================= MAGIC FIREFLIES =============== */
/* ================================================= */

.magic-fireflies{

  position:fixed;

  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:-6;
}

.magic-fireflies span{

  position:absolute;

  width:4px;
  height:4px;

  border-radius:50%;

  background:#F6D28B;

  box-shadow:
    0 0 10px rgba(246,210,139,0.9),
    0 0 24px rgba(246,210,139,0.6),
    0 0 42px rgba(255,255,255,0.4);

  opacity:.5;

  animation:
    fireflyFloat linear infinite;
}

.magic-fireflies span:nth-child(1){
  top:12%;
  left:18%;
  animation-duration:18s;
}

.magic-fireflies span:nth-child(2){
  top:30%;
  left:70%;
  animation-duration:22s;
}

.magic-fireflies span:nth-child(3){
  top:60%;
  left:40%;
  animation-duration:20s;
}

.magic-fireflies span:nth-child(4){
  top:82%;
  left:78%;
  animation-duration:26s;
}

.magic-fireflies span:nth-child(5){
  top:70%;
  left:12%;
  animation-duration:24s;
}

.magic-fireflies span:nth-child(6){
  top:20%;
  left:52%;
  animation-duration:19s;
}

.magic-fireflies span:nth-child(7){
  top:45%;
  left:84%;
  animation-duration:23s;
}

.magic-fireflies span:nth-child(8){
  top:58%;
  left:22%;
  animation-duration:27s;
}

@keyframes fireflyFloat{

  0%{

    transform:
      translateY(0px)
      translateX(0px)
      scale(1);

    opacity:.15;
  }

  25%{
    opacity:.8;
  }

  50%{

    transform:
      translateY(-30px)
      translateX(18px)
      scale(1.5);
  }

  75%{
    opacity:.5;
  }

  100%{

    transform:
      translateY(-60px)
      translateX(-12px)
      scale(.8);

    opacity:.08;
  }
}

/* ================================================= */
/* ================= FLOATING PETALS =============== */
/* ================================================= */

.floating-petals{

  position:fixed;

  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:-4;
}

.floating-petals span{

  position:absolute;

  width:18px;
  height:18px;

  background:
    radial-gradient(
      circle at 30% 30%,
      rgba(255,255,255,0.95),
      rgba(255,220,230,0.4),
      transparent 72%
    );

  border-radius:
    70% 30% 70% 30%;

  opacity:.22;

  animation:
    petalsFall linear infinite;
}

.floating-petals span:nth-child(1){
  left:8%;
  animation-duration:18s;
}

.floating-petals span:nth-child(2){
  left:22%;
  animation-duration:22s;
}

.floating-petals span:nth-child(3){
  left:38%;
  animation-duration:20s;
}

.floating-petals span:nth-child(4){
  left:52%;
  animation-duration:24s;
}

.floating-petals span:nth-child(5){
  left:66%;
  animation-duration:19s;
}

.floating-petals span:nth-child(6){
  left:82%;
  animation-duration:25s;
}

@keyframes petalsFall{

  0%{

    transform:
      translateY(-120px)
      rotate(0deg)
      translateX(0px);

    opacity:0;
  }

  10%{
    opacity:.22;
  }

  50%{

    transform:
      translateY(50vh)
      rotate(180deg)
      translateX(30px);
  }

  100%{

    transform:
      translateY(110vh)
      rotate(360deg)
      translateX(-20px);

    opacity:0;
  }
}

/* ================================================= */
/* ================= SPIRIT MIST =================== */
/* ================================================= */

.spirit-mist{

  position:fixed;

  inset:0;

  z-index:-7;

  overflow:hidden;

  pointer-events:none;
}

.spirit-mist span{

  position:absolute;

  width:600px;
  height:600px;

  border-radius:50%;

  filter:blur(120px);

  opacity:.10;

  mix-blend-mode:screen;

  animation:
    spiritMove linear infinite alternate;
}

.spirit-mist span:nth-child(1){

  background:
    radial-gradient(
      circle,
      rgba(170,210,255,0.18),
      transparent 72%
    );

  top:-120px;
  left:-120px;

  animation-duration:28s;
}

.spirit-mist span:nth-child(2){

  background:
    radial-gradient(
      circle,
      rgba(255,220,180,0.12),
      transparent 72%
    );

  bottom:-180px;
  right:-120px;

  animation-duration:34s;
}

@keyframes spiritMove{

  from{

    transform:
      translateX(0px)
      translateY(0px)
      scale(1);
  }

  to{

    transform:
      translateX(40px)
      translateY(-20px)
      scale(1.08);
  }
}

/* ================================================= */
/* ==================== HEADER ===================== */
/* ================================================= */

.header{

  position:fixed;

  top:0;
  width:100%;

  padding:22px 32px;

  display:flex;

  justify-content:space-between;
  align-items:center;

  z-index:999;

  background:
    linear-gradient(
      to bottom,
      rgba(10,12,10,0.58),
      transparent
    );

  backdrop-filter:blur(14px);
}

.logo{

  font-family:'Cormorant Garamond', serif;

  font-size:2.3rem;

  color:white;

  text-decoration:none;

  letter-spacing:1px;
}

/* ================================================= */
/* ====================== HERO ===================== */
/* ================================================= */

.hero{

  position:relative;

  min-height:100vh;

  display:flex;

  align-items:flex-end;

  padding:
    0 8%
    110px;

  overflow:hidden;
}

.hero-image{

  position:absolute;

  inset:0;

  z-index:0;
}

.hero-image img{

  width:100%;
  height:100%;

  object-fit:cover;

  filter:
    brightness(.58)
    saturate(.90)
    contrast(1.04);
}

.hero-image::after{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(8,10,12,0.98) 0%,
      rgba(18,22,26,0.82) 28%,
      rgba(18,24,28,0.36) 54%,
      transparent 84%
    );
}

.lantern-glow{

  position:absolute;

  inset:0;

  z-index:2;

  pointer-events:none;
}

.lantern-glow::before{

  content:"";

  position:absolute;

  width:420px;
  height:420px;

  top:18%;
  right:8%;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,210,140,0.16),
      rgba(255,180,90,0.08),
      transparent 72%
    );

  filter:blur(40px);

  animation:
    lanternPulse 8s ease-in-out infinite;
}

@keyframes lanternPulse{

  from{

    transform:scale(1);

    opacity:.4;
  }

  to{

    transform:scale(1.12);

    opacity:.75;
  }
}

.fog{

  position:absolute;

  inset:0;

  z-index:1;

  background:

    radial-gradient(
      circle at 30% 50%,
      rgba(255,255,255,0.08),
      transparent 36%
    ),

    radial-gradient(
      circle at 80% 40%,
      rgba(255,255,255,0.05),
      transparent 42%
    );

  filter:blur(50px);

  animation:
    fogMove 18s ease-in-out infinite alternate;
}

@keyframes fogMove{

  from{
    transform:translateX(0px);
  }

  to{
    transform:translateX(-20px);
  }
}

.hero-content{

  position:relative;

  z-index:3;

  max-width:760px;
}

.location{

  color:#D6B17B;

  letter-spacing:5px;

  text-transform:uppercase;

  margin-bottom:20px;

  font-size:.9rem;
}

.hero h1{

  font-family:'Cormorant Garamond', serif;

  font-size:7rem;

  line-height:.92;

  margin-bottom:28px;

  text-shadow:
    0 12px 40px rgba(0,0,0,0.5);

  animation:
    titleFade 2.4s ease;
}

@keyframes titleFade{

  from{

    opacity:0;

    transform:
      translateY(30px)
      scale(.96);

    filter:blur(8px);
  }

  to{

    opacity:1;

    transform:
      translateY(0px)
      scale(1);

    filter:blur(0px);
  }
}

.hero p{

  max-width:620px;

  line-height:1.9;

  color:rgba(255,255,255,0.88);

  font-size:1.08rem;

  margin-bottom:42px;
}

/* ================================================= */
/* ===================== BUTTON ==================== */
/* ================================================= */

.btn{

  display:inline-flex;

  align-items:center;

  gap:12px;

  padding:
    16px 30px;

  border-radius:50px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.14),
      rgba(255,255,255,0.05)
    );

  border:
    1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  color:white;

  text-decoration:none;

  transition:.5s;

  position:relative;

  overflow:hidden;
}

.btn::before{

  content:"";

  position:absolute;

  inset:-2px;

  border-radius:50px;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.24),
      transparent
    );

  transform:
    translateX(-120%);

  animation:
    buttonShine 5s linear infinite;
}

@keyframes buttonShine{

  to{

    transform:
      translateX(120%);
  }
}

.btn:hover{

  transform:
    translateY(-4px);

  background:
    rgba(255,255,255,0.14);
}

/* ================================================= */
/* ==================== SECTION ==================== */
/* ================================================= */

.section{

  padding:
    140px 8%;
}

.section-title{

  font-family:'Cormorant Garamond', serif;

  font-size:4.6rem;

  margin-bottom:34px;

  text-align:center;

  line-height:1;
}

.section-text{

  max-width:920px;

  margin:auto;

  text-align:center;

  line-height:2;

  color:rgba(255,255,255,0.82);

  font-size:1.05rem;
}

/* ================================================= */
/* ==================== GALLERY ==================== */
/* ================================================= */

.gallery{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

  gap:30px;
}

.gallery img{

  width:100%;

  height:460px;

  object-fit:cover;

  border-radius:30px;

  transition:1s;

  animation:
    gentleFloat 8s ease-in-out infinite alternate;
}

@keyframes gentleFloat{

  from{
    transform:translateY(0px);
  }

  to{
    transform:translateY(-8px);
  }
}

.gallery img:hover{

  transform:
    translateY(-10px)
    scale(1.02);
}

@media(max-width:768px){

  .hero h1{
    font-size:4.6rem;
  }

  .section-title{
    font-size:3rem;
  }

  .gallery img{
    height:320px;
  }

}

</style>
</head>

<body>

<div class="vignette"></div>

<!-- MAGIC FIREFLIES -->

<div class="magic-fireflies">

  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>

</div>

<!-- FLOATING PETALS -->

<div class="floating-petals">

  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>

</div>

<!-- SPIRIT MIST -->

<div class="spirit-mist">

  <span></span>
  <span></span>

</div>

<header class="header">

  <a href="index.html" class="logo">
    Orumi Journeys
  </a>

</header>

<section class="hero">

  <div class="lantern-glow"></div>

  <div class="hero-image">
    <img src="imgginzan/fullscreen.jpg" alt="">
  </div>

  <div class="fog"></div>

  <div class="hero-content">

    <div class="location">
      JAPAN • GINZAN ONSEN
    </div>

    <h1>
      Ginzan
    </h1>

    <p>
      Un pequeño pueblo termal cubierto de nieve, luces cálidas y ryokans tradicionales que parecen existir dentro de un recuerdo de Studio Ghibli.
    </p>

    <a href="#itinerary" class="btn">
      Explorar itinerario →
    </a>

  </div>

</section>

</body>
</html>
