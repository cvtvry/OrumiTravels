<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Orumi | Slow journeys, lasting memories</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <style>

    /* =========================
       RESET
    ========================= */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Nunito', sans-serif;
      overflow-x:hidden;
      background:#f4efe6;
      color:white;
    }

    /* =========================
       LOADER
    ========================= */

    .loader{
      position:fixed;
      inset:0;
      background:#f4efe6;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
      transition:1s;
    }

    .loader.hidden{
      opacity:0;
      visibility:hidden;
    }

    .flower{
      width:70px;
      height:70px;
      border:3px solid #d8b38a;
      border-top-color:transparent;
      border-radius:50%;
      animation:spin 2s linear infinite;
      margin-bottom:20px;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .loader p{
      color:#2d2d2d;
      font-family:'Cormorant Garamond', serif;
      font-size:1.5rem;
      letter-spacing:2px;
    }

    /* =========================
       HERO
    ========================= */

    .hero{
      position:relative;
      height:100vh;

      background-image:
      linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
      url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;

      overflow:hidden;
    }

    /* =========================
       HEADER
    ========================= */

    .header{
      position:fixed;
      top:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 25px;
      z-index:1000;
      backdrop-filter:blur(10px);
    }

    .logo{
      font-family:'Cormorant Garamond', serif;
      font-size:2.3rem;
      letter-spacing:2px;
    }

    /* =========================
       MENÚ
    ========================= */

    .menu-toggle{
      width:35px;
      height:25px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      z-index:1001;
    }

    .menu-toggle span{
      height:3px;
      background:white;
      border-radius:20px;
    }

    .menu{
      position:fixed;
      top:0;
      right:-100%;
      width:260px;
      height:100vh;
      background:rgba(28,28,28,0.96);

      display:flex;
      flex-direction:column;

      padding-top:120px;

      transition:0.5s;
    }

    .menu.active{
      right:0;
    }

    .menu a{
      color:white;
      text-decoration:none;
      padding:20px 40px;
      font-size:1.1rem;
      transition:0.3s;
    }

    .menu a:hover{
      background:rgba(255,255,255,0.08);
      padding-left:50px;
    }

    /* =========================
       HERO CONTENT
    ========================= */

    .hero-content{
      position:relative;
      z-index:2;
      padding:20px;
      max-width:800px;

      animation:fadeUp 2s ease;
    }

    .slogan{
      font-family:'Cormorant Garamond', serif;
      font-size:2rem;
      margin-bottom:20px;
      color:#f5e5d0;
      letter-spacing:2px;
    }

    .hero h1{
      font-size:3rem;
      font-weight:300;
      line-height:1.2;
      margin-bottom:40px;
    }

    .btn{
      padding:16px 36px;
      border:none;
      border-radius:50px;
      background:#d8b38a;
      color:white;
      font-size:1rem;
      cursor:pointer;

      transition:0.4s;
    }

    .btn:hover{
      transform:translateY(-5px);
      background:#c89a6c;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    /* =========================
       PARTÍCULAS
    ========================= */

    .particles span{
      position:absolute;
      bottom:-20px;
      width:8px;
      height:8px;
      background:rgba(255,255,255,0.4);
      border-radius:50%;

      animation:float linear infinite;
    }

    @keyframes float{

      from{
        transform:translateY(0);
        opacity:0;
      }

      to{
        transform:translateY(-110vh);
        opacity:1;
      }

    }

    /* =========================
       ANIMACIONES
    ========================= */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       RESPONSIVE
    ========================= */

    @media(max-width:768px){

      .hero h1{
        font-size:2rem;
      }

      .slogan{
        font-size:1.5rem;
      }

      .logo{
        font-size:2rem;
      }

    }

  </style>
</head>

<body>

  <!-- Loader -->

  <div class="loader" id="loader">

    <div class="flower"></div>

    <p>Entering Orumi...</p>

  </div>

  <!-- Header -->

  <header class="header">

    <div class="logo">
      Orumi
    </div>

    <!-- Menú hamburguesa -->

    <div class="menu-toggle" id="menu-toggle">

      <span></span>
      <span></span>
      <span></span>

    </div>

    <!-- Menú -->

    <nav class="menu" id="menu">

      <a href="#">Inicio</a>
      <a href="#">Destinos</a>
      <a href="#">Reserva</a>
      <a href="#">Ofertas</a>
      <a href="#">Sobre Nosotros</a>
      <a href="#">Contacto</a>

    </nav>

  </header>

  <!-- Hero -->

  <section class="hero">

    <!-- Partículas -->

    <div class="particles" id="particles"></div>

    <!-- Texto -->

    <div class="hero-content">

      <p class="slogan">
        Slow journeys, lasting memories
      </p>

      <h1>
        Viajes tranquilos inspirados en mundos mágicos
      </h1>

      <button class="btn">
        Reservar Ahora
      </button>

    </div>

  </section>

  <script>

    /* =========================
       LOADER
    ========================= */

    window.addEventListener("load", () => {

      const loader = document.getElementById("loader");

      setTimeout(() => {

        loader.classList.add("hidden");

      }, 1800);

    });

    /* =========================
       MENÚ
    ========================= */

    const toggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");

    toggle.addEventListener("click", () => {

      menu.classList.toggle("active");

    });

    /* =========================
       PARTÍCULAS
    ========================= */

    const particles = document.getElementById("particles");

    for(let i = 0; i < 40; i++){

      const span = document.createElement("span");

      span.style.left = Math.random() * 100 + "%";

      span.style.animationDuration =
      (8 + Math.random() * 10) + "s";

      span.style.animationDelay =
      Math.random() * 5 + "s";

      particles.appendChild(span);

    }

  </script>

</body>
</html>
