<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Orumi | Slow journeys, lasting memories</title>

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <style>

    /* =========================
       RESET
    ========================= */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Nunito', sans-serif;
      overflow-x:hidden;
      background:#f4efe6;
      color:white;
    }

    /* =========================
       LOADER
    ========================= */

    .loader{
      position:fixed;
      inset:0;
      background:#f4efe6;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
      transition:1s;
    }

    .loader.hidden{
      opacity:0;
      visibility:hidden;
    }

    .flower{
      width:70px;
      height:70px;
      border:3px solid #d8b38a;
      border-top-color:transparent;
      border-radius:50%;
      animation:spin 2s linear infinite;
      margin-bottom:20px;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .loader p{
      color:#2d2d2d;
      font-family:'Cormorant Garamond', serif;
      font-size:1.5rem;
      letter-spacing:2px;
    }

    /* =========================
       HERO
    ========================= */

    .hero{

      position:relative;

      height:100vh;

      background-image:

      linear-gradient(
      rgba(0,0,0,0.42),
      rgba(0,0,0,0.45)
      ),

      url('img/sunset-train.jpg');

      background-size:cover;

      background-position:center;

      background-attachment:fixed;

      display:flex;

      justify-content:center;

      align-items:center;

      text-align:center;

      overflow:hidden;

    }

    /* =========================
       NIEBLA
    ========================= */

    .fog{

      position:absolute;

      inset:0;

      background:
      radial-gradient(
      circle at 20% 50%,
      rgba(255,255,255,0.06),
      transparent 40%
      ),

      radial-gradient(
      circle at 80% 60%,
      rgba(255,255,255,0.05),
      transparent 40%
      );

      animation:fogMove 20s linear infinite;

      z-index:1;

    }

    @keyframes fogMove{

      0%{
        transform:translateX(0);
      }

      50%{
        transform:translateX(-20px);
      }

      100%{
        transform:translateX(0);
      }

    }

    /* =========================
       HEADER
    ========================= */

    .header{

      position:fixed;

      top:0;

      width:100%;

      display:flex;

      justify-content:space-between;

      align-items:center;

      padding:20px 25px;

      z-index:1000;

      backdrop-filter:blur(10px);

    }

    .logo{

      font-family:'Cormorant Garamond', serif;

      font-size:2.5rem;

      letter-spacing:2px;

      color:white;

      text-shadow:0 4px 20px rgba(0,0,0,0.4);

    }

    /* =========================
       MENÚ
    ========================= */

    .menu-toggle{

      width:35px;

      height:25px;

      display:flex;

      flex-direction:column;

      justify-content:space-between;

      cursor:pointer;

      z-index:1001;

    }

    .menu-toggle span{

      height:3px;

      background:white;

      border-radius:20px;

    }

    .menu{

      position:fixed;

      top:0;

      right:-100%;

      width:260px;

      height:100vh;

      background:rgba(22,22,22,0.96);

      display:flex;

      flex-direction:column;

      padding-top:120px;

      transition:0.5s;

      backdrop-filter:blur(15px);

    }

    .menu.active{
      right:0;
    }

    .menu a{

      color:white;

      text-decoration:none;

      padding:20px 40px;

      font-size:1.1rem;

      transition:0.3s;

    }

    .menu a:hover{

      background:rgba(255,255,255,0.08);

      padding-left:50px;

    }

    /* =========================
       HERO CONTENT
    ========================= */

    .hero-content{

      position:relative;

      z-index:3;

      max-width:850px;

      padding:20px;

      animation:fadeUp 2s ease;

    }

    .slogan{

      font-family:'Cormorant Garamond', serif;

      font-size:2rem;

      margin-bottom:25px;

      color:#f5e5d0;

      letter-spacing:2px;

      text-shadow:0 4px 20px rgba(0,0,0,0.4);

    }

    .hero h1{

      font-size:3.5rem;

      line-height:1.2;

      font-weight:300;

      margin-bottom:40px;

      text-shadow:0 6px 30px rgba(0,0,0,0.5);

    }

    /* =========================
       BOTÓN
    ========================= */

    .btn{

      padding:16px 38px;

      border:none;

      border-radius:50px;

      background:rgba(216,179,138,0.9);

      color:white;

      font-size:1rem;

      cursor:pointer;

      transition:0.4s;

      backdrop-filter:blur(10px);

      box-shadow:0 10px 30px rgba(0,0,0,0.25);

    }

    .btn:hover{

      transform:translateY(-6px);

      background:#c89a6c;

      box-shadow:0 14px 35px rgba(0,0,0,0.4);

    }

    /* =========================
       PARTÍCULAS
    ========================= */

    .particles span{

      position:absolute;

      bottom:-20px;

      width:8px;

      height:8px;

      background:rgba(255,255,255,0.4);

      border-radius:50%;

      animation:float linear infinite;

    }

    @keyframes float{

      from{

        transform:translateY(0);

        opacity:0;

      }

      to{

        transform:translateY(-110vh);

        opacity:1;

      }

    }

    /* =========================
       ANIMACIÓN HERO
    ========================= */

    @keyframes fadeUp{

      from{

        opacity:0;

        transform:translateY(40px);

      }

      to{

        opacity:1;

        transform:translateY(0);

      }

    }

    /* =========================
       RESPONSIVE
    ========================= */

    @media(max-width:768px){

      .hero{

        background-attachment:scroll;

      }

      .hero h1{

        font-size:2.2rem;

      }

      .slogan{

        font-size:1.5rem;

      }

      .logo{

        font-size:2rem;

      }

    }

  </style>

</head>

<body>

  <!-- =========================
       LOADER
  ========================== -->

  <div class="loader" id="loader">

    <div class="flower"></div>

    <p>Entering Orumi...</p>

  </div>

  <!-- =========================
       HEADER
  ========================== -->

  <header class="header">

    <div class="logo">
      Orumi
    </div>

    <!-- Menú hamburguesa -->

    <div class="menu-toggle" id="menu-toggle">

      <span></span>
      <span></span>
      <span></span>

    </div>

    <!-- Menú -->

    <nav class="menu" id="menu">

      <a href="#">Inicio</a>
      <a href="#">Destinos</a>
      <a href="#">Reserva</a>
      <a href="#">Ofertas</a>
      <a href="#">Sobre Nosotros</a>
      <a href="#">Contacto</a>

    </nav>

  </header>

  <!-- =========================
       HERO
  ========================== -->

  <section class="hero">

    <!-- Niebla -->

    <div class="fog"></div>

    <!-- Partículas -->

    <div class="particles" id="particles"></div>

    <!-- Contenido -->

    <div class="hero-content">

      <p class="slogan">
        Slow journeys, lasting memories
      </p>

      <h1>
        Viajes tranquilos inspirados
        en mundos mágicos
      </h1>

      <button class="btn">
        Reservar Ahora
      </button>

    </div>

  </section>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script>

    /* =========================
       LOADER
    ========================= */

    window.addEventListener("load", () => {

      const loader = document.getElementById("loader");

      setTimeout(() => {

        loader.classList.add("hidden");

      }, 1800);

    });

    /* =========================
       MENÚ
    ========================= */

    const toggle = document.getElementById("menu-toggle");

    const menu = document.getElementById("menu");

    toggle.addEventListener("click", () => {

      menu.classList.toggle("active");

    });

    /* =========================
       PARTÍCULAS
    ========================= */

    const particles =
    document.getElementById("particles");

    for(let i = 0; i < 45; i++){

      const span =
      document.createElement("span");

      span.style.left =
      Math.random() * 100 + "%";

      span.style.animationDuration =
      (8 + Math.random() * 12) + "s";

      span.style.animationDelay =
      Math.random() * 5 + "s";

      particles.appendChild(span);

    }

  </script>

</body>

</html>
