<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sobre Nosotras | Orumi Journeys
  </title>

  <!-- ================= FUENTES ================= -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>

    /* ================================================= */
    /* ================= RESET ========================= */
    /* ================================================= */

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;

    }

    html {

      scroll-behavior: smooth;

    }

    body {

      font-family:
        'Nunito',
        sans-serif;

      background:
        linear-gradient(
          to bottom,
          #18211c,
          #20261f,
          #2b2923
        );

      color: white;

      overflow-x: hidden;

    }

    a {

      text-decoration: none;
      color: inherit;

    }

    img {

      display: block;

    }

    /* ================================================= */
    /* ================= FILM GRAIN ==================== */
    /* ================================================= */

    body::before {

      content: "";

      position: fixed;
      inset: 0;

      background-image:
        radial-gradient(
          rgba(255,255,255,0.03) 1px,
          transparent 1px
        );

      background-size:
        4px 4px;

      opacity: 0.18;

      pointer-events: none;

      z-index: 9999;

    }

    /* ================================================= */
    /* ================= HEADER ======================== */
    /* ================================================= */

    .header {

      position: fixed;

      top: 0;
      left: 0;

      width: 100%;

      padding:
        26px 7vw;

      display: flex;
      justify-content: space-between;
      align-items: center;

      z-index: 1000;

      background:
        rgba(12,16,14,0.28);

      backdrop-filter: blur(16px);

      border-bottom:
        1px solid rgba(255,255,255,0.05);

    }

    .logo {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size: 2rem;

      letter-spacing: 1px;

    }

    .menu {

      display: flex;
      gap: 34px;

    }

    .menu a {

      opacity: 0.72;

      transition:
        opacity 0.4s ease;

      position: relative;

    }

    .menu a:hover,
    .menu a.active {

      opacity: 1;

    }

    .menu a.active::after {

      content: "";

      position: absolute;

      left: 0;
      bottom: -8px;

      width: 100%;
      height: 1px;

      background: white;

    }

    /* ================================================= */
    /* ================= HERO ========================== */
    /* ================================================= */

    .hero {

      position: relative;

      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      text-align: center;

      overflow: hidden;

      background-image:
        url("img/yakushima.jpg");

      background-size: cover;
      background-position: center;

    }

    .hero::before {

      content: "";

      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          to bottom,
          rgba(8,12,10,0.35),
          rgba(8,12,10,0.88)
        );

    }

    .hero-content {

      position: relative;
      z-index: 2;

      max-width: 1000px;

      padding:
        0 20px;

      animation:
        fadeUp 1.5s ease;

    }

    .hero-mini {

      letter-spacing: 5px;

      text-transform: uppercase;

      opacity: 0.7;

      margin-bottom: 22px;

      font-size: 0.85rem;

    }

    .hero h1 {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size:
        clamp(3.5rem, 8vw, 7rem);

      line-height: 0.95;

      margin-bottom: 35px;

      font-weight: 600;

    }

    .hero p {

      max-width: 760px;

      margin: auto;

      line-height: 2;

      font-size: 1.1rem;

      opacity: 0.82;

    }

    /* ================================================= */
    /* ================= GENERAL ======================= */
    /* ================================================= */

    section {

      position: relative;

    }

    .section-mini {

      letter-spacing: 4px;

      text-transform: uppercase;

      font-size: 0.78rem;

      opacity: 0.6;

      margin-bottom: 20px;

    }

    .section-title {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size:
        clamp(3rem,5vw,5.5rem);

      line-height: 1;

      margin-bottom: 35px;

    }

    .section-text {

      line-height: 2.1;

      opacity: 0.82;

      font-size: 1.05rem;

      max-width: 900px;

    }

    /* ================================================= */
    /* ================= STORY ========================= */
    /* ================================================= */

    .story-section {

      padding:
        160px 7vw;

    }

    .story-layout {

      display: grid;

      grid-template-columns:
        1fr 1fr;

      gap: 80px;

      align-items: center;

    }

    .story-image {

      position: relative;

      overflow: hidden;

      border-radius: 36px;

    }

    .story-image img {

      width: 100%;
      height: 760px;

      object-fit: cover;

      transition:
        transform 1.6s ease;

    }

    .story-image:hover img {

      transform: scale(1.04);

    }

    /* ================================================= */
    /* ================= VALUES ======================== */
    /* ================================================= */

    .values-section {

      padding:
        100px 7vw;

    }

    .values-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit,minmax(260px,1fr));

      gap: 24px;

      margin-top: 60px;

    }

    .value {

      padding:
        34px 30px;

      border-radius: 28px;

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.05);

      backdrop-filter: blur(12px);

      transition:
        transform 0.5s ease,
        background 0.5s ease;

    }

    .value:hover {

      transform:
        translateY(-6px);

      background:
        rgba(255,255,255,0.08);

    }

    .value h3 {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size: 2rem;

      margin-bottom: 18px;

    }

    .value p {

      line-height: 1.9;

      opacity: 0.82;

      font-size: 0.98rem;

    }

    /* ================================================= */
    /* ================= IMAGE BREAK =================== */
    /* ================================================= */

    .image-break {

      height: 80vh;

      background-image:
        url("img/forest-fog.jpg");

      background-size: cover;
      background-position: center;

      background-attachment: fixed;

      position: relative;

    }

    .image-break::before {

      content: "";

      position: absolute;
      inset: 0;

      background:
        rgba(10,12,10,0.45);

    }

    /* ================================================= */
    /* ================= DIFFERENCE ==================== */
    /* ================================================= */

    .difference-section {

      padding:
        140px 7vw;

    }

    .difference-content {

      max-width: 950px;

    }

    .difference-list {

      display: flex;
      flex-direction: column;

      gap: 24px;

      margin-top: 45px;

    }

    .difference-item {

      padding-left: 24px;

      position: relative;

      line-height: 2;

      opacity: 0.84;

    }

    .difference-item::before {

      content: "";

      position: absolute;

      left: 0;
      top: 14px;

      width: 8px;
      height: 8px;

      border-radius: 50%;

      background:
        rgba(255,255,255,0.65);

    }

    /* ================================================= */
    /* ================= FOUNDERS ====================== */
    /* ================================================= */

    .founders-section {

      padding:
        140px 7vw;

    }

    .founders-title {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size:
        clamp(3rem,5vw,5rem);

      line-height: 1;

      max-width: 700px;

      margin-bottom: 70px;

    }

    .founders-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit,minmax(320px,1fr));

      gap: 40px;

    }

    .founder {

      position: relative;

    }

    .founder img {

      width: 100%;
      height: 650px;

      object-fit: cover;

      border-radius: 32px;

    }

    .founder-text {

      padding-top: 25px;

    }

    .founder-text h3 {

      font-family:
        'Cormorant Garamond',
        serif;

      font-size: 2.2rem;

      margin-bottom: 18px;

    }

    .founder-text p {

      line-height: 2;

      opacity: 0.82;

    }

    /* ================================================= */
    /* ================= TESTIMONIALS ================== */
    /* ================================================= */

    .testimonials {

      padding:
        140px 7vw;

    }

    .testimonial-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

      gap: 30px;

      margin-top: 60px;

    }

    .testimonial {

      padding:
        34px;

      border-radius: 28px;

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.05);

      line-height: 2;

      opacity: 0.85;

    }

    .testimonial span {

      display: block;

      margin-top: 24px;

      opacity: 0.6;

    }

    /* ================================================= */
    /* ================= FINAL CTA ===================== */
    /* ================================================= */

    .final
