<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hoi An | Orumi Journeys</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================================================= */
/* ====================== RESET ==================== */
/* ================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{

  font-family:'Nunito', sans-serif;

  overflow-x:hidden;

  color:white;

  background:#1d1b1a;

  position:relative;
}

/* ================================================= */
/* ================= MAIN BACKGROUND =============== */
/* ================================================= */

body::before{

  content:"";

  position:fixed;

  inset:0;

  z-index:-10;

  background:

    radial-gradient(
      circle at 50% -10%,
      rgba(255,220,170,0.18),
      transparent 38%
    ),

    radial-gradient(
      circle at 0% 50%,
      rgba(50,34,24,0.34),
      transparent 44%
    ),

    radial-gradient(
      circle at 100% 50%,
      rgba(30,20,16,0.30),
      transparent 42%
    ),

    radial-gradient(
      circle at 24% 72%,
      rgba(180,110,60,0.18),
      transparent 32%
    ),

    radial-gradient(
      circle at 82% 38%,
      rgba(255,190,120,0.14),
      transparent 24%
    ),

    radial-gradient(
      circle at 50% 50%,
      rgba(255,255,255,0.05),
      transparent 56%
    ),

    linear-gradient(
      180deg,

      #8A674B 0%,
      #73563E 18%,
      #624633 36%,
      #51392A 52%,
      #3D2A21 70%,
      #241813 100%
    );

  background-attachment:fixed;
}

body::after{

  content:"";

  position:fixed;

  inset:0;

  z-index:-9;

  opacity:.14;

  background-image:
    url("https://www.transparenttextures.com/patterns/rice-paper-3.png");

  mix-blend-mode:soft-light;

  pointer-events:none;
}

/* ================================================= */
/* ================= ATMOSPHERE ==================== */
/* ================================================= */

.forest-atmosphere{

  position:fixed;

  inset:0;

  z-index:-8;

  overflow:hidden;

  pointer-events:none;
}

.forest-fog{

  position:absolute;

  inset:-10%;

  background:

    radial-gradient(
      circle at 18% 24%,
      rgba(255,220,180,0.08),
      transparent 24%
    ),

    radial-gradient(
      circle at 80% 34%,
      rgba(255,180,120,0.05),
      transparent 30%
    ),

    radial-gradient(
      circle at 52% 76%,
      rgba(255,255,255,0.04),
      transparent 36%
    );

  filter:blur(120px);

  opacity:.95;

  animation:
    forestFogMove 40s ease-in-out infinite alternate;
}

@keyframes forestFogMove{

  from{
    transform:
      translateX(0px)
      translateY(0px)
      scale(1);
  }

  to{
    transform:
      translateX(-28px)
      translateY(-12px)
      scale(1.04);
  }
}

/* ================================================= */
/* ================= LANTERN LIGHTS ================ */
/* ================================================= */

.gold-particles{

  position:absolute;

  inset:0;

  overflow:hidden;
}

.gold-particles span{

  position:absolute;

  width:4px;
  height:4px;

  border-radius:50%;

  background:#FFD08A;

  opacity:.5;

  box-shadow:
    0 0 18px rgba(255,208,138,0.7);

  animation:
    goldFloat linear infinite;
}

.gold-particles span:nth-child(1){
  top:14%;
  left:18%;
  animation-duration:20s;
}

.gold-particles span:nth-child(2){
  top:28%;
  left:72%;
  animation-duration:24s;
}

.gold-particles span:nth-child(3){
  top:58%;
  left:42%;
  animation-duration:28s;
}

.gold-particles span:nth-child(4){
  top:74%;
  left:82%;
  animation-duration:26s;
}

.gold-particles span:nth-child(5){
  top:48%;
  left:12%;
  animation-duration:22s;
}

.gold-particles span:nth-child(6){
  top:22%;
  left:52%;
  animation-duration:18s;
}

@keyframes goldFloat{

  from{

    transform:
      translateY(0px)
      scale(1);

    opacity:.2;
  }

  50%{
    opacity:.8;
  }

  to{

    transform:
      translateY(-20px)
      scale(1.5);

    opacity:.18;
  }
}

/* ================================================= */
/* ==================== HEADER ===================== */
/* ================================================= */

.header{

  position:fixed;

  top:0;
  width:100%;

  padding:22px 32px;

  display:flex;

  justify-content:space-between;
  align-items:center;

  z-index:999;

  background:

    linear-gradient(
      to bottom,
      rgba(10,12,10,0.58),
      transparent
    );

  backdrop-filter:blur(14px);
}

.logo{

  font-family:'Cormorant Garamond', serif;

  font-size:2.3rem;

  color:white;

  text-decoration:none;

  letter-spacing:1px;
}

/* ================================================= */
/* ====================== MENU ===================== */
/* ================================================= */

.nav-menu{

  display:flex;

  align-items:center;

  gap:18px;
}

.nav-menu a{

  color:white;

  text-decoration:none;

  font-size:.95rem;

  letter-spacing:1px;

  padding:10px 18px;

  border-radius:30px;

  transition:.4s;

  background:
    rgba(255,255,255,0.04);

  border:
    1px solid rgba(255,255,255,0.06);

  backdrop-filter:blur(10px);
}

.nav-menu a:hover{

  background:
    rgba(255,255,255,0.12);

  transform:
    translateY(-2px);
}

/* ================================================= */
/* ====================== HERO ===================== */
/* ================================================= */

.hero{

  position:relative;

  min-height:100vh;

  display:flex;

  align-items:flex-end;

  padding:
    0 8%
    110px;

  overflow:hidden;
}

.hero-image{

  position:absolute;

  inset:0;

  z-index:0;
}

.hero-image img{

  width:100%;
  height:100%;

  object-fit:cover;

  filter:
    brightness(.55)
    saturate(.95)
    contrast(1.06);
}

.hero-image::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    linear-gradient(
      to top,
      rgba(6,10,8,0.98) 0%,
      rgba(16,20,18,0.82) 28%,
      rgba(18,24,20,0.36) 54%,
      transparent 84%
    );
}

.fog{

  position:absolute;

  inset:0;

  z-index:1;

  background:

    radial-gradient(
      circle at 30% 50%,
      rgba(255,220,180,0.08),
      transparent 36%
    ),

    radial-gradient(
      circle at 80% 40%,
      rgba(255,200,120,0.06),
      transparent 42%
    );

  filter:blur(50px);

  animation:
    fogMove 18s ease-in-out infinite alternate;
}

@keyframes fogMove{

  from{
    transform:translateX(0px);
  }

  to{
    transform:translateX(-20px);
  }
}

.hero-content{

  position:relative;

  z-index:3;

  max-width:760px;
}

.location{

  color:#FFD08A;

  letter-spacing:5px;

  text-transform:uppercase;

  margin-bottom:20px;

  font-size:.9rem;
}

.hero h1{

  font-family:'Cormorant Garamond', serif;

  font-size:7rem;

  line-height:.92;

  margin-bottom:28px;

  text-shadow:
    0 12px 40px rgba(0,0,0,0.5);
}

.hero p{

  max-width:620px;

  line-height:1.9;

  color:rgba(255,255,255,0.88);

  font-size:1.08rem;

  margin-bottom:42px;
}

/* ================================================= */
/* ===================== BUTTON ==================== */
/* ================================================= */

.btn{

  display:inline-flex;

  align-items:center;

  gap:12px;

  padding:
    16px 30px;

  border-radius:50px;

  background:

    linear-gradient(
      to bottom,
      rgba(255,255,255,0.14),
      rgba(255,255,255,0.05)
    );

  border:
    1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  color:white;

  text-decoration:none;

  transition:.5s;
}

.btn:hover{

  transform:
    translateY(-4px);

  background:
    rgba(255,255,255,0.14);
}

/* ================================================= */
/* ==================== SECTION ==================== */
/* ================================================= */

.section{

  padding:
    140px 8%;
}

.section-title{

  font-family:'Cormorant Garamond', serif;

  font-size:4.6rem;

  margin-bottom:34px;

  text-align:center;

  line-height:1;
}

.section-text{

  max-width:920px;

  margin:auto;

  text-align:center;

  line-height:2;

  color:rgba(255,255,255,0.82);

  font-size:1.05rem;
}

/* ================================================= */
/* ================= GALLERY INTRO ================= */
/* ================================================= */

.gallery-intro{

  text-align:center;

  max-width:900px;

  margin:
    0 auto 70px auto;
}

.gallery-label{

  display:block;

  margin-bottom:22px;

  letter-spacing:6px;

  font-size:.82rem;

  color:#FFD08A;

  opacity:.9;
}

.gallery-intro h2{

  font-family:'Cormorant Garamond', serif;

  font-size:5rem;

  font-weight:300;

  margin-bottom:24px;

  color:#F4F1EA;
}

.gallery-line{

  width:120px;

  height:1px;

  margin:
    0 auto 34px auto;

  background:

    linear-gradient(
      to right,
      transparent,
      rgba(255,208,138,0.9),
      transparent
    );
}

.gallery-intro p{

  font-size:1.08rem;

  line-height:2;

  color:rgba(255,255,255,0.70);
}

/* ================================================= */
/* ==================== GALLERY ==================== */
/* ================================================= */

.gallery{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

  gap:30px;
}

.gallery img{

  width:100%;

  height:460px;

  object-fit:cover;

  border-radius:30px;

  transition:1s;

  box-shadow:
    0 25px 60px rgba(0,0,0,0.32);
}

.gallery img:hover{

  transform:
    translateY(-10px)
    scale(1.02);
}

/* ================================================= */
/* ================= ACTIVITIES ==================== */
/* ================================================= */

.activities{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

  gap:34px;
}

.activity-card{

  overflow:hidden;

  border-radius:32px;

  background:

    linear-gradient(
      to bottom,
      rgba(255,255,255,0.08),
      rgba(255,255,255,0.03)
    );

  border:
    1px solid rgba(255,255,255,0.06);

  backdrop-filter:blur(14px);

  transition:.7s;

  box-shadow:
    0 25px 70px rgba(0,0,0,0.32);
}

.activity-card:hover{

  transform:
    translateY(-10px);
}

.activity-card img{

  width:100%;
  height:260px;

  object-fit:cover;
}

.activity-content{

  padding:34px;
}

.activity-content h3{

  font-family:'Cormorant Garamond', serif;

  font-size:2rem;

  margin-bottom:18px;
}

.activity-content p{

  line-height:1.9;

  color:rgba(255,255,255,0.78);
}

/* ================================================= */
/* ================= ITINERARY GRID ================ */
/* ================================================= */

.itinerary-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(340px,1fr));

  gap:38px;

  margin-top:70px;
}

.experience-card{

  overflow:hidden;

  border-radius:34px;

  background:

    linear-gradient(
      to bottom,
      rgba(255,255,255,0.06),
      rgba(255,255,255,0.02)
    );

  border:
    1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 25px 70px rgba(0,0,0,0.34);

  backdrop-filter:blur(10px);

  transition:.7s;
}

.experience-card:hover{

  transform:
    translateY(-10px)
    scale(1.02);
}

.experience-card img{

  width:100%;

  height:260px;

  object-fit:cover;
}

.experience-content{

  padding:34px;
}

.experience-content h3{

  font-family:'Cormorant Garamond', serif;

  font-size:2.2rem;

  margin-bottom:24px;

  line-height:1.1;
}

.experience-content ul{

  padding-left:18px;
}

.experience-content li{

  margin-bottom:14px;

  color:rgba(255,255,255,0.82);

  line-height:1.7;
}

/* ================================================= */
/* ==================== PACKAGE ==================== */
/* ================================================= */

.package-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(340px,1fr));

  gap:40px;

  margin-top:60px;
}

.package-card{

  overflow:hidden;

  border-radius:38px;

  background:

    linear-gradient(
      to bottom,
      rgba(255,255,255,0.08),
      rgba(255,255,255,0.03)
    );

  border:
    1px solid rgba(255,255,255,0.06);

  backdrop-filter:blur(14px);

  box-shadow:
    0 25px 70px rgba(0,0,0,0.34);

  transition:.7s;
}

.package-card:hover{

  transform:
    translateY(-10px);
}

.package-card img{

  width:100%;

  height:420px;

  object-fit:cover;
}

.package-content{

  padding:42px;
}

.package-content h3{

  font-family:'Cormorant Garamond', serif;

  font-size:3rem;

  margin-bottom:20px;

  line-height:1;
}

.package-content h4{

  margin-top:34px;

  margin-bottom:18px;

  color:#FFD08A;

  font-size:1.1rem;

  letter-spacing:2px;

  text-transform:uppercase;
}

.package-content p{

  line-height:1.9;

  color:rgba(255,255,255,0.82);

  margin-bottom:18px;
}

.package-content ul{

  padding-left:18px;
}

.package-content li{

  line-height:1.9;

  color:rgba(255,255,255,0.78);
}

.price{

  font-size:2.5rem;

  color:#FFD08A;

  margin:
    38px 0 20px;
}

/* ================================================= */
/* ==================== MOBILE ===================== */
/* ================================================= */

@media(max-width:768px){

  .header{
    padding:18px 20px;
  }

  .nav-menu a{
    padding:8px 14px;
    font-size:.85rem;
  }

  .hero{
    padding:0 7% 80px;
  }

  .hero h1{
    font-size:4.6rem;
  }

  .section-title{
    font-size:3rem;
  }

  .gallery-intro h2{
    font-size:3.2rem;
  }

  .gallery img{
    height:320px;
  }

}

</style>
</head>

<body>

<div class="forest-atmosphere">

  <div class="forest-fog"></div>

  <div class="gold-particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

  </div>

</div>

<header class="header">

  <a href="index.html" class="logo">
    Orumi Journeys
  </a>

  <nav class="nav-menu">
    <a href="index.html">Inicio</a>
  </nav>

</header>

<section class="hero">

  <div class="hero-image">
    <img src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=1600&auto=format&fit=crop" alt="">
  </div>

  <div class="fog"></div>

  <div class="hero-content">

    <div class="location">
      VIETNAM • HOI AN
    </div>

    <h1>
      Hoi An
    </h1>

    <p>
      Una ciudad antigua iluminada por faroles dorados, calles amarillas y noches junto al río que parecen sacadas de un sueño nostálgico.
    </p>

    <a href="#itinerary" class="btn">
      Explorar itinerario →
    </a>

  </div>

</section>

<!-- RESTO DEL CONTENIDO EXACTAMENTE IGUAL -->

<script>

/* ================================================= */
/* ============== PARALLAX ATMOSPHERE ============== */
/* ================================================= */

document.addEventListener("mousemove",(e)=>{

  const fog=document.querySelector(".forest-fog");

  const x=(e.clientX/window.innerWidth)*10;
  const y=(e.clientY/window.innerHeight)*10;

  fog.style.transform=`translate(${-x}px,${-y}px)`;
});

/* ================================================= */
/* ================= SCROLL REVEAL ================= */
/* ================================================= */

const cards=document.querySelectorAll(
  ".activity-card,.experience-card,.package-card,.gallery img"
);

const observer=new IntersectionObserver((entries)=>{

  entries.forEach(entry=>{

    if(entry.isIntersecting){

      entry.target.style.opacity="1";
      entry.target.style.transform="translateY(0px)";
    }

  });

},{
  threshold:.15
});

cards.forEach(card=>{

  card.style.opacity="0";
  card.style.transform="translateY(40px)";
  card.style.transition="1s ease";

  observer.observe(card);
});

</script>

</body>
</html>
